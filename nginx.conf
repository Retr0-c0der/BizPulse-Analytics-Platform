worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Rate limiting zones ──────────────────────────────────
    # /token endpoint: max 10 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;

    # General API: max 120 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=120r/m;

    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── General settings ─────────────────────────────────────
    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # ── Upstream ─────────────────────────────────────────────
    upstream fastapi {
        server website:8000;
    }

    server {
        listen 80;
        server_name _;       # accepts any hostname; replace with your domain for production

        # ── Security headers ─────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"           always;
        add_header X-Content-Type-Options    "nosniff"              always;
        add_header X-XSS-Protection          "1; mode=block"        always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy
            "default-src 'self'; connect-src 'self' https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:;"
            always;

        # ── /token — strict rate limit ────────────────────────
        location = /token {
            limit_req zone=login_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://fastapi;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── All API routes — general rate limit ───────────────
        location /api/ {
            limit_req zone=api_limit burst=30 nodelay;
            limit_req_status 429;

            proxy_pass         http://fastapi;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Keep connections alive for streaming responses (CSV/PDF)
            proxy_buffering    off;
            proxy_read_timeout 120s;
        }

        # ── Everything else (HTML, static files) ─────────────
        location / {
            proxy_pass         http://fastapi;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Hide Nginx version in error pages ────────────────
        server_tokens off;
    }
}